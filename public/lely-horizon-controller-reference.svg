    <line x1="82" y1="0" x2="82" y2="84" stroke="#405469" stroke-opacity=".55"/>
    <line x1="0" y1="84" x2="1408" y2="84" stroke="#1EA7F7" stroke-opacity=".55"/>
    <g transform="translate(22 23)" stroke="#B9C4CD" stroke-width="6" stroke-linecap="round">
      <line x1="2" y1="4" x2="36" y2="4"/>
      <line x1="2" y1="18" x2="36" y2="18"/>
      <line x1="2" y1="32" x2="36" y2="32"/>
    </g>
    <text class="ui thin label36" x="100" y="52">PHASE:</text>
    <text class="ui bold label36" x="224" y="52">MAIN 1</text>
    <text class="ui thin label36" x="566" y="52" fill="#A9D9FF">PLAYER A'S TURN</text>
    <rect x="1106" y="9" width="61" height="61" rx="10" fill="url(#button)" stroke="#5F7186" stroke-width="2"/>
    <text class="ui bold label40" x="1123" y="52">−</text>
    <text class="ui thin label32" x="1188" y="34">PLAYER A</text>
    <text class="ui thin label32" x="1188" y="68">LIFE:</text>
    <text class="ui bold label36" x="1280" y="68">20</text>
    <rect x="1333" y="9" width="61" height="61" rx="10" fill="url(#button)" stroke="#5F7186" stroke-width="2"/>
    <text class="ui bold label40" x="1348" y="53">+</text>
  </g>

  <g id="opponent">
    <rect y="84" width="1408" height="108" fill="#132333" opacity=".72"/>
    <line x1="0" y1="192" x2="1408" y2="192" stroke="#C9D8E5" stroke-opacity=".42" stroke-width="2"/>
    <text class="ui label32 thin" x="30" y="130">OPPONENT (PLAYER B)</text>
    <text class="ui label28 thin muted" x="30" y="168">LIFE: 18</text>
    <text class="ui label28 thin muted" x="150" y="168">|</text>
    <text class="ui label28 thin muted" x="176" y="168">HAND: 5 CARDS</text>
  </g>

  <g id="hand-label">
