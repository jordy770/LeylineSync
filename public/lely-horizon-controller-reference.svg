  <g id="selected-card" filter="url(#redGlow)">
    <rect x="579" y="159" width="251" height="356" rx="14" fill="#1D0D0B" stroke="#FFD0C4" stroke-width="5"/>
    <rect x="595" y="176" width="219" height="180" rx="6" fill="url(#cardRed)" stroke="#000" stroke-width="2"/>
