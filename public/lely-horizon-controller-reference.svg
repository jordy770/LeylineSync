<svg width="1408" height="768" viewBox="0 0 1408 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1408" y2="768" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B121B"/>
      <stop offset="0.42" stop-color="#132433"/>
      <stop offset="0.72" stop-color="#1B1517"/>
      <stop offset="1" stop-color="#090B10"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182332" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#070A0F" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="0" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#354454"/>
      <stop offset="1" stop-color="#151B25"/>
    </linearGradient>
    <linearGradient id="blueButton" x1="0" y1="0" x2="400" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#126ED8"/>
      <stop offset="0.5" stop-color="#1D9BFF"/>
      <stop offset="1" stop-color="#086BC4"/>
    </linearGradient>
    <linearGradient id="cardRed" x1="0" y1="0" x2="0" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9E3D2A"/>
      <stop offset="0.45" stop-color="#33191A"/>
      <stop offset="1" stop-color="#15161C"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="0" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EA8C8"/>
      <stop offset="0.5" stop-color="#123246"/>
      <stop offset="1" stop-color="#10151D"/>
    </linearGradient>
    <linearGradient id="cardWhite" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8D9A8"/>
      <stop offset="0.45" stop-color="#8E826A"/>
      <stop offset="1" stop-color="#15151A"/>
    </linearGradient>
    <filter id="blueGlow" x="-30%" y="-80%" width="160%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#27A7FF" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#27A7FF" flood-opacity="0.45"/>
    </filter>
    <filter id="redGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FF5D65" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="#FF373D" flood-opacity="0.55"/>
    </filter>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-60%" width="140%" height="220%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
    <style>
      .ui { font-family: Inter, Arial, Helvetica, sans-serif; fill: #F3F6F8; filter: url(#textShadow); }
      .muted { fill: #B9C0C8; opacity: .9; }
      .thin { font-weight: 500; }
      .bold { font-weight: 900; }
      .label28 { font-size: 28px; letter-spacing: .02em; }
      .label32 { font-size: 32px; letter-spacing: .02em; }
      .label36 { font-size: 36px; letter-spacing: .01em; }
      .label40 { font-size: 40px; letter-spacing: .02em; }
      .small { font-size: 16px; }
      .micro { font-size: 12px; opacity: .72; }
      .cardText { font-family: Georgia, serif; fill: #111; font-size: 13px; font-weight: 700; }
      .cardSmall { font-family: Georgia, serif; fill: #111; font-size: 10px; }
    </style>
  </defs>

  <rect width="1408" height="768" fill="url(#bg)"/>
  <rect width="1408" height="768" fill="#000814" opacity=".22"/>
  <circle cx="705" cy="230" r="440" fill="#1B82B8" opacity=".10"/>
  <circle cx="1190" cy="240" r="280" fill="#9A3E2F" opacity=".10"/>

  <g id="topbar">
