<svg width="3928" height="560" viewBox="0 0 3928 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screenBg" x1="0" y1="0" x2="932" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090B10"/>
      <stop offset="0.52" stop-color="#151922"/>
      <stop offset="1" stop-color="#08090D"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B414E"/>
      <stop offset="0.38" stop-color="#252A34"/>
      <stop offset="1" stop-color="#191D25"/>
    </linearGradient>
    <linearGradient id="priority" x1="0" y1="0" x2="120" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F05D2F"/>
      <stop offset="1" stop-color="#F4B44D"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font: 700 14px Inter, Arial, sans-serif; fill: #F6F3EB; }
      .small { font: 700 10px Inter, Arial, sans-serif; fill: #F6F3EB; opacity: .64; letter-spacing: .08em; }
      .tiny { font: 700 9px Inter, Arial, sans-serif; fill: #F6F3EB; opacity: .62; }
      .title { font: 900 18px Inter, Arial, sans-serif; fill: #F6F3EB; }
      .frameTitle { font: 900 20px Inter, Arial, sans-serif; fill: #111827; }
      .note { font: 600 13px Inter, Arial, sans-serif; fill: #475569; }
      .buttonText { font: 900 12px Inter, Arial, sans-serif; fill: #F6F3EB; }
      .priorityText { font: 950 12px Inter, Arial, sans-serif; fill: #160C05; letter-spacing: .04em; }
    </style>
  </defs>

  <rect width="3928" height="560" fill="#EEF2F7"/>

  <g transform="translate(24 24)">
    <text class="frameTitle" x="0" y="0" dominant-baseline="hanging">A1 - Normal Hand</text>
    <text class="note" x="0" y="30">Default state: hand centraal, globale acties rechts, geen selected-card dock.</text>
    <g transform="translate(0 74)">
      <rect width="932" height="430" rx="28" fill="url(#screenBg)" filter="url(#softShadow)"/>
      <circle cx="190" cy="120" r="170" fill="#275668" opacity=".24"/>
      <circle cx="760" cy="330" r="190" fill="#673528" opacity=".22"/>

      <g transform="translate(24 24)">
        <rect width="92" height="72" rx="16" fill="#F6F3EB" opacity=".08" stroke="#F6F3EB" stroke-opacity=".14"/>
        <text class="small" x="16" y="20">JIJ</text>
        <text class="title" x="16" y="54">18</text>

        <g transform="translate(0 88)">
          <circle cx="20" cy="20" r="18" fill="#F6F3EB" opacity=".10"/>
          <circle cx="60" cy="20" r="18" fill="#F6F3EB" opacity=".10"/>
          <circle cx="20" cy="62" r="18" fill="#F6F3EB" opacity=".10"/>
          <circle cx="60" cy="62" r="18" fill="#F6F3EB" opacity=".10"/>
          <circle cx="20" cy="104" r="18" fill="#F6F3EB" opacity=".10"/>
          <circle cx="60" cy="104" r="18" fill="#F6F3EB" opacity=".10"/>
          <text class="small" x="16" y="24">W</text><text class="small" x="57" y="24">1</text>
          <text class="small" x="16" y="66">B</text><text class="small" x="57" y="66">1</text>
          <text class="small" x="16" y="108">G</text><text class="small" x="57" y="108">C</text>
        </g>

        <rect y="240" width="92" height="52" rx="14" fill="#F6F3EB" opacity=".08" stroke="#F6F3EB" stroke-opacity=".14"/>
        <text class="small" x="14" y="260">BOARD</text><text class="label" x="62" y="274">4</text>
        <rect y="304" width="92" height="52" rx="14" fill="#F6F3EB" opacity=".08" stroke="#F6F3EB" stroke-opacity=".14"/>
        <text class="small" x="14" y="324">OPP</text><text class="label" x="68" y="338">2</text>
      </g>

      <g transform="translate(140 24)">
        <rect width="624" height="44" rx="16" fill="#F6F3EB" opacity=".08"/>
        <text class="small" x="20" y="27">TURN 4</text>
        <text class="label" x="274" y="28">Main Phase</text>
        <text class="small" x="542" y="27">PRIORITY</text>

        <g transform="translate(92 160)">
          <g transform="translate(0 28) rotate(-8 58 82)">
            <rect width="116" height="164" rx="14" fill="url(#cardBg)" stroke="#F6F3EB" stroke-opacity=".16"/>
            <text class="tiny" x="12" y="22">UU</text><text class="label" x="12" y="84">Counterspell</text><text class="tiny" x="12" y="146">Instant</text>
          </g>
          <g transform="translate(92 8) rotate(-4 58 82)">
            <rect width="116" height="164" rx="14" fill="url(#cardBg)" stroke="#F6F3EB" stroke-opacity=".16"/>
            <text class="tiny" x="12" y="22">LAND</text><text class="label" x="12" y="84">Island</text><text class="tiny" x="12" y="146">Land</text>
          </g>
          <g transform="translate(184 0)">
            <rect width="116" height="164" rx="14" fill="url(#cardBg)" stroke="#F6F3EB" stroke-opacity=".16"/>
            <text class="tiny" x="12" y="22">U</text><text class="label" x="12" y="84">Opt</text><text class="tiny" x="12" y="146">Instant</text>
          </g>
          <g transform="translate(276 8) rotate(4 58 82)">
            <rect width="116" height="164" rx="14" fill="url(#cardBg)" stroke="#F6F3EB" stroke-opacity=".16"/>
            <text class="tiny" x="12" y="22">1U</text><text class="label" x="12" y="78">Snapcaster</text><text class="tiny" x="12" y="146">Creature</text>
          </g>
          <g transform="translate(368 28) rotate(8 58 82)">
            <rect width="116" height="164" rx="14" fill="url(#cardBg)" stroke="#F6F3EB" stroke-opacity=".16"/>
            <text class="tiny" x="12" y="22">R</text><text class="label" x="12" y="78">Lightning Bolt</text><text class="tiny" x="12" y="146">Instant</text>
          </g>
        </g>
      </g>

      <g transform="translate(788 24)">
        <rect width="120" height="56" rx="14" fill="url(#priority)"/><text class="priorityText" x="16" y="34">PASS PRIORITY</text>
        <rect y="72" width="120" height="50" rx="14" fill="#F6F3EB" opacity=".08" stroke="#F6F3EB" stroke-opacity=".14"/><text class="buttonText" x="18" y="102">Open Hand</text>
        <rect y="136" width="120" height="50" rx="14" fill="#F6F3EB" opacity=".08" stroke="#F6F3EB" stroke-opacity=".14"/><text class="buttonText" x="18" y="166">Opponents</text>
        <rect y="200" width="120" height="50" rx="14" fill="#F6F3EB" opacity=".08" stroke="#F6F3EB" stroke-opacity=".14"/><text class="buttonText" x="18" y="230">Stack</text>
      </g>
    </g>
  </g>

  <g transform="translate(998 24)">
    <text class="frameTitle" x="0" y="0" dominant-baseline="hanging">A2 - Card Action Modal</text>
    <text class="note" x="0" y="30">Short tap op handkaart: action modal, hand blijft onderliggend stabiel.</text>
    <g transform="translate(0 74)">
      <rect width="932" height="430" rx="28" fill="url(#screenBg)" filter="url(#softShadow)"/>
      <rect width="932" height="430" rx="28" fill="#050609" opacity=".58"/>
      <g transform="translate(254 104)">
        <rect width="424" height="222" rx="20" fill="#141820" stroke="#F6F3EB" stroke-opacity=".16"/>
        <rect x="18" y="18" width="130" height="186" rx="16" fill="url(#cardBg)" stroke="#F6F3EB" stroke-opacity=".16"/>
        <text class="tiny" x="34" y="44">UU</text>
        <text class="title" x="34" y="108">Counterspell</text>
        <text class="tiny" x="34" y="178">Instant</text>
        <text class="small" x="174" y="42">CARD ACTIONS</text>
        <text class="title" x="174" y="72">Counterspell</text>
        <rect x="174" y="94" width="218" height="38" rx="12" fill="url(#priority)"/><text class="priorityText" x="194" y="118">CAST / PLAY</text>
        <rect x="174" y="140" width="218" height="34" rx="12" fill="#F6F3EB" opacity=".08"/><text class="buttonText" x="194" y="162">Choose Targets</text>
        <rect x="174" y="182" width="100" height="28" rx="10" fill="#F6F3EB" opacity=".08"/><text class="buttonText" x="198" y="201">Pay Mana</text>
        <rect x="292" y="182" width="100" height="28" rx="10" fill="#F6F3EB" opacity=".08"/><text class="buttonText" x="324" y="201">Close</text>
      </g>
    </g>
  </g>

  <g transform="translate(1972 24)">
    <text class="frameTitle" x="0" y="0" dominant-baseline="hanging">A3 - Hold Inspect</text>
    <text class="note" x="0" y="30">Long press: kaart groot in beeld zolang de vinger vasthoudt; geen acties.</text>
    <g transform="translate(0 74)">
      <rect width="932" height="430" rx="28" fill="url(#screenBg)" filter="url(#softShadow)"/>
      <rect width="932" height="430" rx="28" fill="#050609" opacity=".72"/>
      <g transform="translate(386 50)">
        <rect width="160" height="240" rx="18" fill="url(#cardBg)" stroke="#F6F3EB" stroke-opacity=".18"/>
        <text class="tiny" x="18" y="30">UU</text>
        <text class="title" x="18" y="116">Counterspell</text>
        <text class="tiny" x="18" y="206">Instant</text>
        <text class="tiny" x="18" y="224">Release to close inspect</text>
      </g>
      <text class="small" x="390" y="338">HOLD INSPECT PREVIEW</text>
    </g>
  </g>

  <g transform="translate(2946 24)">
    <text class="frameTitle" x="0" y="0" dominant-baseline="hanging">A4 - Stack Overlay Appears</text>
    <text class="note" x="0" y="30">Als iemand iets speelt: tijdelijke stack awareness met Pass Priority altijd bereikbaar.</text>
    <g transform="translate(0 74)">
      <rect width="932" height="430" rx="28" fill="url(#screenBg)" filter="url(#softShadow)"/>
      <g transform="translate(28 28)">
        <rect width="876" height="374" rx="22" fill="#050609" opacity=".54"/>
        <text class="small" x="28" y="42">STACK EVENT</text>
        <text class="title" x="28" y="74">Opponent casts Fatal Push</text>
        <rect x="28" y="100" width="300" height="74" rx="16" fill="#F6F3EB" opacity=".08" stroke="#F6F3EB" stroke-opacity=".14"/>
        <text class="label" x="48" y="130">Fatal Push</text>
        <text class="tiny" x="48" y="154">Target: Ledger Shredder</text>
        <rect x="28" y="190" width="300" height="74" rx="16" fill="#F6F3EB" opacity=".08" stroke="#F6F3EB" stroke-opacity=".14"/>
        <text class="label" x="48" y="220">Available response</text>
        <text class="tiny" x="48" y="244">Counterspell in hand</text>
        <g transform="translate(410 70)">
          <rect width="116" height="164" rx="14" fill="url(#cardBg)" stroke="#F6F3EB" stroke-opacity=".16"/>
          <text class="tiny" x="12" y="22">UU</text><text class="label" x="12" y="84">Counterspell</text><text class="tiny" x="12" y="146">Instant</text>
        </g>
        <g transform="translate(704 42)">
          <rect width="140" height="56" rx="14" fill="url(#priority)"/><text class="priorityText" x="24" y="34">PASS PRIORITY</text>
          <rect y="74" width="140" height="50" rx="14" fill="#F6F3EB" opacity=".08"/><text class="buttonText" x="22" y="104">Cast Response</text>
          <rect y="138" width="140" height="50" rx="14" fill="#F6F3EB" opacity=".08"/><text class="buttonText" x="22" y="168">Back to Hand</text>
        </g>
      </g>
    </g>
  </g>
</svg>
