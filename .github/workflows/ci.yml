# CI — every push/PR: types, lint, and the FULL engine suite (~1900 tests)
# against a real local Supabase Postgres, exactly like dev (test:db:setup
# builds the isolated test DB from local-bootstrap + migrations).
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Types
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      # NOT `supabase start`: that auto-applies supabase/migrations/ into a fresh
      # DB, which fails — the baseline schema lives in supabase/local-bootstrap/
      # (the hosted/local split). test:db:setup builds the whole test DB itself;
      # it only needs a bare Supabase-Postgres (roles/extensions preinstalled)
      # on 54322. Image pinned to the local dev version.
      - name: Start Postgres (supabase image, port 54322)
        run: |
          docker run -d --name pg -p 54322:5432 \
            -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=postgres \
            supabase/postgres:17.6.1.111
          until docker exec pg pg_isready -U postgres -h 127.0.0.1 >/dev/null 2>&1; do sleep 2; done

      # deck-smoke needs the Scryfall oracle bulk (~170MB, gitignored). Cached
      # across runs; bump the key to refresh the dump.
      - name: Restore Scryfall oracle bulk
        id: oracle-cache
        uses: actions/cache@v4
        with:
          path: lib/oracle-cards.json
          key: scryfall-oracle-v1

      - name: Download Scryfall oracle bulk (cache miss)
        if: steps.oracle-cache.outputs.cache-hit != 'true'
        run: |
          url=$(curl -s https://api.scryfall.com/bulk-data/oracle-cards | jq -r .download_uri)
          curl -sL "$url" -o lib/oracle-cards.json
          ls -la lib/oracle-cards.json

      - name: Build test database
        run: npm run test:db:setup

      - name: Engine + unit tests
        run: npm test
