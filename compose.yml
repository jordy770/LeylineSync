services:
  web:
    image: leylinesync
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SHOW_DEV_CONTROLS: ${NEXT_PUBLIC_SHOW_DEV_CONTROLS:-false}
    env_file: .env
    restart: unless-stopped
    expose:
      - "3000"

  # AI-CPU bot runner — polls Postgres directly (DATABASE_URL), no HTTP surface.
  # --watch is required (without it the runner exits with a usage error and the
  # service crash-loops). For hosted play, provision a bot auth user first
  # (scripts/create-bot-user.mjs) and append: "--bot", "<auth-user-id>".
  bot:
    image: leylinesync
    command: ["npm", "run", "bot", "--", "--watch"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      - web

  # Janitor — every 6h deletes the runtime rows of games finished >24h ago
  # (cleanup_finished_session, mig 144). Results/history are kept.
  cleanup:
    image: leylinesync
    command: ["node", "scripts/cleanup-runner.mjs", "--watch"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      - web

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
